# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: jia926778的个人博客
subtitle: '记录AI相关的学习和工作经验'
description: 这是我用Hexo搭建的个人博客，分享技术、生活与思考。
keywords: Hexo, 博客, 技术教程, AI, Python, 大模型, conda, UV, RAG
author: jia
language: zh-CN
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as https://username.github.io/project
url: https://jia926778.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: false
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: next

# Deployment
deploy:
  type: git
  repo: git@github.com:jia926778/jia926778.github.io.git
  branch: main

# RSS 订阅配置
feed:
  type: atom
  path: atom.xml
  limit: 20
  autodiscovery: true

# 搜索插件配置
search:
  path: search.json
  field: post
  format: html
  limit: 10000

# Sitemap配置
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true