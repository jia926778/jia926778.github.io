name: Hexo Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Inject Gitalk Secret
      if: ${{ secrets.GITALK_CLIENT_SECRET }}
      run: sed -i "s/GITALK_CLIENT_SECRET_PLACEHOLDER/${{ secrets.GITALK_CLIENT_SECRET }}/" _config.next.yml

    - name: Generate
      run: npm run build

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public